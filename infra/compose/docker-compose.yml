
services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - "6379:6379"

  ingest:
    build:
      context: ../../services/ingest
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8081:8081"
    depends_on:
      - db
      - redis

  realtime:
    build:
      context: ../../services/realtime
      dockerfile: Dockerfile
    environment:
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8082:8082"
    depends_on:
      - redis

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - realtime

volumes:
  pgdata: